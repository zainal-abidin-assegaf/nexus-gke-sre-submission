# Default values for nexus-gke Helm chart
# Override these in a separate values file per environment

image:
  repository: gcr.io/YOUR_PROJECT_ID/nexus-gcs  # Replace with your GCR image path
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer   # Exposes Nexus publicly; use ClusterIP + Ingress in production
  port: 8081
  targetPort: 8081

persistence:
  enabled: true
  storageClass: "standard"   # GKE default StorageClass (GCE Persistent Disk)
  accessMode: ReadWriteOnce
  size: 20Gi

# GCS Blob Store config — Nexus reads these to connect to your bucket
gcs:
  bucketName: "nexus-artifacts-bucket"   # Must match the bucket created in Terraform

# Workload Identity: the K8s ServiceAccount is linked to a GCP ServiceAccount
# that has Storage Object Admin on the bucket
serviceAccount:
  name: nexus-sa
  gcpServiceAccount: "nexus-gcs-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com"

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "4Gi"
    cpu: "2"
